<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>相片亭 - 頂級三連拍體驗</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Noto+Sans+TC:wght@300;400;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <header>
            <h1 class="glow-text">相片亭 <span class="badge">LAB 2</span></h1>
            <p class="subtitle">捕捉瞬間，凝結永恆</p>
        </header>

        <main>
            <div class="camera-section">
                <div class="video-wrapper">
                    <video id="camera-stream" autoplay playsinline muted></video>
                    <div id="countdown-overlay" class="hidden">3</div>
                    <div id="flash-overlay"></div>
                </div>

                <div class="filters-container">
                    <button class="filter-btn active" data-filter="none">原圖</button>
                    <button class="filter-btn" data-filter="grayscale(100%)">黑白</button>
                    <button class="filter-btn" data-filter="sepia(100%)">復古</button>
                    <button class="filter-btn" data-filter="invert(100%)">負片</button>
                    <button class="filter-btn" data-filter="contrast(150%) brightness(110%)">鮮豔</button>
                </div>

                <div class="controls">
                    <button id="btn-detect" class="btn btn-secondary">
                        <span class="icon">📷</span> 偵測鏡頭
                    </button>
                    <button id="btn-capture-triple" class="btn btn-primary" disabled>
                        <span class="icon">⚡</span> 三連拍模式
                    </button>

                    <div class="download-group">
                        <select id="layout-select" class="btn btn-secondary select-layout">
                            <option value="portrait">直式佈局</option>
                            <option value="landscape">橫式佈局</option>
                        </select>
                        <button id="btn-download" class="btn btn-accent" disabled>
                            <span class="icon">💾</span> 下載
                        </button>
                    </div>
                </div>
            </div>

            <section class="gallery-section">
                <h2>最近拍下的瞬間</h2>
                <div id="photo-gallery" class="gallery-grid">
                    <div class="placeholder-text">尚未拍下任何照片</div>
                </div>
            </section>
        </main>

        <footer>
            <a href="../index.html" class="back-link">← 回首頁</a>
        </footer>
    </div>

    <!-- Hidden canvas for processing -->
    <canvas id="capture-canvas" style="display: none;"></canvas>
    <canvas id="combine-canvas" style="display: none;"></canvas>

    <script src="script.js"></script>
</body>

</html>
